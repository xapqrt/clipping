<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain-Sync</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        width: 420px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica', sans-serif;
        background: #0f0f14;
        color: #e0e0e8;
        padding: 16px;
    }
    .header {
        display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .header h1 {
        font-size: 18px; font-weight: 600; letter-spacing: -0.3px;
        background: linear-gradient(135deg, #82b1ff, #a78bfa);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header .badge {
        font-size: 10px; background: #1e1e2a; padding: 2px 8px;
        border-radius: 20px; color: #888; border: 1px solid #2a2a3a;
    }
    .search-wrap {
        position: relative; margin-bottom: 16px;
    }
    .search-wrap input {
        width: 100%; padding: 8px 12px; border-radius: 12px;
        border: 1px solid #2a2a3a; background: #1e1e24;
        color: #e0e0e8; font-size: 14px; outline: none;
        transition: border-color 0.2s;
    }
    .search-wrap input:focus { border-color: #5b7cfa; }
        .search-wrap input::placeholder { color: #555; }
        .status { font-size: 12px; color: #888; margin-bottom: 12px; }
        .result {
          background: #1a1a24; border-radius: 10px; padding: 12px;
          margin-bottom: 8px; border: 1px solid #222;
          transition: border-color 0.15s;
        }
         .result:hover { border-color: #3a3a4a; }
            .result .title {
              font-size: 14px; font-weight: 600; margin-bottom: 4px;
              color: #c8d0ff;
            }
             .result .snippet {
                  font-size: 12px; color: #999; line-height: 1.4;
                  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
                  overflow: hidden; margin-bottom: 6px;
                }
                .result .meta {
                      font-size: 11px; color: #666; display: flex; justify-content: space-between;
                    }
                    .result .meta a { color: #5b7cfa; text-decoration: none; }
                    .result .meta a:hover { text-decoration: underline; }
                    .result .score {
                      color: #555; font-family: monospace; font-size: 10px;
                    }
                    .empty {
                      text-align: center; padding: 32px 0; color: #555;
                    }
                    .empty span { font-size: 32px; display: block; margin-bottom: 8px; }
                    .shortcut-hint {
                      font-size: 11px; color: #444; text-align: center; margin-top: 12px;
                    }
                    </style>
</head>
<body>
    <div class="header">
        <h1>Brain-Sync</h1>
        <span class="badge">local</span>
    </div>
    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="Semantic search your clips..." autofocus>
    </div>
    <div class="status" id="status">waiting for input.....</div>
    <div id="results"></div>
    <div class="shortcut-hint">right-click any page → "Clip to Brain-Sync"</div>
<script src="popup.js" type ="module"></script>
</body>
</html>
