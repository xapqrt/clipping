<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain-Sync</title>
    <style>
       body { font-family: ui-monospace, Menlo, monospace; margin: 0; padding: 12px; width: 340px; background: #f7f8f4; }
       h1 { font-size: 14px; margin: 0 0 8px; }    
    #query { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #bbb; border-radius: 8px; }
    .row { display: flex; gap: 8px; margin-top: 8px; }
    button { flex: 1; padding: 8px; cursor: pointer; border-radius: 8px; border: 1px solid #333; background: #fff; }
    .tiny { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tiny input { width: 100%; box-sizing: border-box; padding: 6px; border: 1px solid #bbb; border-radius: 8px; }
    #stats { margin-top: 8px; font-size: 11px; opacity: .8; }
     #clear_btn { margin-top: 8px; width: 100%; }
    #backup_row { margin-top: 8px; display: flex; gap: 8px; }
     #recent { margin-top: 10px; font-size: 11px; max-height: 100px; overflow: auto; border-top: 1px dashed #bbb; padding-top: 8px; }
   #domains { margin-top: 8px; font-size: 11px; max-height: 90px; overflow: auto; border-top: 1px dashed #bbb; padding-top: 8px; }
     #results { margin-top: 10px; font-size: 12px; max-height: 300px; overflow: auto; }
   </style>    
    </head>
    <body>
    <h1>Brain-Sync</h1>
       <input id="query" type="text" placeholder="search memory..." />
         <div class="row">
         <button id="clip_btn">Clip Current Page</button>
            <button id="search_btn">Search Local</button>
    </div>
   <div class ="tiny">
     <input id="domain_filter" type="text" placeholder="domain filter (optional)" />
       <input id="min_score" type="number" step="0.01" placeholder="min score, e.g. 0.2" />
   </div>
    <div id="stats">chunks: 0 | pages: 0</div>
   <button id="clear_btn">Clear Local Vault</button>
  <div id="backup_row">
  <button id="export_btn">Export Backup</button>
  <button id="import_btn">Import Backup</button>
   </div>
  <input  id="import_file" type="file" accept="application/json" style="display:none" />
<div id="recent">recent clips will show here...</div>
   <div id="domains">Top domains will show here...</div>
   <div id="results">No query yet.</div>
    <script type="module" src="popup.js"></script>
    </body>
</html>
